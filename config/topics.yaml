year_from: 2022       # LLM-in-education is mostly a post-ChatGPT phenomenon
year_to: 2026
max_results_per_query: 500
top_n_to_summarize: 30

# LLM-in-education papers are newer → fewer citations → lower threshold
# Average 15
# Strict 25
min_quality_score: 25

# After judging, drop papers whose topic_relevance is below this value.
# 1=off-topic  2=tangential  3=related  4=directly relevant  5=exact topic
# 4 = require papers to be specifically about your topic (recommended for narrow topics)
# 3 = also keep conceptually related background papers (default)
min_topic_relevance: 4

# Keep only papers at or above this inclusion tier (core > useful > marginal > cut).
#   core     = only primary, general surveys of the exact topic (strictest)
#   useful   = core + strong related/context surveys (recommended)
#   marginal = also keep domain-specific & non-survey papers
#   cut      = no tier filtering
min_paper_tier: core

# Drop papers scoped to one narrow vertical (clinical, finance, agriculture, etc.)
# even if otherwise on-topic. True is recommended for a general architecture survey.
exclude_domain_specific: true

# Landmark seminal primary papers (ReAct/Self-RAG style). The survey-only pipeline
# normally hides primary papers; this surfaces the foundational ones the surveys
# repeatedly build on, so a newcomer can read the original techniques.
landmarks_enabled: true
landmark_min_mentions: 2      # must be referenced by >= this many surveys
# Kept low on purpose: OpenAlex undercounts citations for seminal papers (the
# original RAG paper shows ~18 there). The "referenced by >= N surveys" gate is
# the real quality control.
landmark_min_citations: 15
landmark_max_count: 8         # cap the number surfaced

survey_terms:
  - survey
  - review
  - systematic review
  - systematic literature review

topics:
  # Broad catch-all — captures the main survey body
  - Agentic RAG Systems